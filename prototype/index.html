/* GlobalTech Accessible DS — Color tokens
   Every text pairing ≥ 4.5:1 on its surface; UI borders/icons ≥ 3:1.
   Status is NEVER conveyed by color alone — always icon + text + color.
   Verified in WebAIM Contrast Checker. */

:root {
  /* ---- Base palette ---- */
  --color-ink: #1F2933;         /* body text — ~14.8:1 on white */
  --color-ink-soft: #3E4C59;    /* secondary text — ~9.7:1 on white */
  --color-white: #FFFFFF;
  --color-surface: #FFFFFF;     /* page background */
  --color-surface-alt: #F4F6F8; /* cards, sections */
  --color-surface-sunken: #E4E7EB;

  --color-primary: #1D4ED8;     /* primary actions, active — white text ~5.2:1 */
  --color-primary-hover: #1E40AF;
  --color-primary-active: #1E3A8A;
  --color-primary-ink: #FFFFFF; /* text on primary */

  --color-link: #1D4ED8;        /* links — always underlined */
  --color-link-visited: #6D28D9;/* ~5.9:1 on white */
  --color-link-hover: #1E40AF;

  --color-border: #595959;      /* input borders, dividers — 3.9:1 on white */
  --color-border-soft: #CBD2D9; /* low-emphasis dividers (non-essential) */

  /* ---- Semantic status (pair with icon + text) ---- */
  --color-error: #B91C1C;       /* ~6.4:1 on white */
  --color-error-surface: #FEF2F2;
  --color-error-border: #B91C1C;

  --color-success: #15803D;     /* ~4.9:1 on white */
  --color-success-surface: #F0FDF4;
  --color-success-border: #15803D;

  --color-warning: #B45309;     /* ~4.9:1 on white */
  --color-warning-surface: #FFFBEB;
  --color-warning-border: #B45309;

  --color-info: #1D4ED8;
  --color-info-surface: #EFF4FF;
  --color-info-border: #1D4ED8;

  /* ---- Focus ---- */
  --color-focus-ring: #1D4ED8;  /* inner ring */
  --color-focus-halo: #FFFFFF;  /* contrasting halo for coloured backgrounds */

  /* ---- Disabled ---- */
  --color-disabled-bg: #E4E7EB;
  --color-disabled-ink: #52606D; /* meets 4.5:1 on disabled bg */
  --color-disabled-border: #9AA5B1;

  /* ---- Semantic aliases ---- */
  --text-body: var(--color-ink);
  --text-muted: var(--color-ink-soft);
  --text-on-primary: var(--color-primary-ink);
  --surface-page: var(--color-surface);
  --surface-card: var(--color-white);
  --surface-section: var(--color-surface-alt);
  --border-field: var(--color-border);
  --border-divider: var(--color-border-soft);
}

/* GlobalTech Accessible DS — Typography tokens
   rem units on a 16px base so 200%-zoom / browser text resize works.
   Minimum body 16px; never below 14px; no thin weights under 16px.
   Line-height ≥ 1.5 for body copy. */

:root {
  --font-sans: "Public Sans", "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Consolas, monospace;

  /* ---- Type scale (rem) ---- */
  --text-h1-size: 2rem;      /* 32px */
  --text-h1-line: 1.25;
  --text-h1-weight: 700;

  --text-h2-size: 1.5rem;    /* 24px */
  --text-h2-line: 1.3;
  --text-h2-weight: 700;

  --text-h3-size: 1.25rem;   /* 20px */
  --text-h3-line: 1.35;
  --text-h3-weight: 600;

  --text-body-size: 1rem;    /* 16px */
  --text-body-line: 1.5;
  --text-body-weight: 400;

  --text-lead-size: 1.125rem;/* 18px intro copy */
  --text-lead-line: 1.55;

  --text-small-size: 0.875rem; /* 14px — floor for supporting text */
  --text-small-line: 1.5;

  --text-label-size: 1rem;   /* form labels stay full size */
  --text-label-weight: 600;

  /* ---- Weights ---- */
  --font-weight-regular: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  /* ---- Paragraph rhythm (≥ 1.5× font size) ---- */
  --paragraph-spacing: 1.5em;
}

/* GlobalTech Accessible DS — Spacing, sizing & target tokens
   8px base scale. Interactive targets ≥ 44×44px (comfortable),
   24px absolute floor, ≥ 8px apart. */

:root {
  /* ---- 8px spacing scale ---- */
  --space-0: 0;
  --space-1: 0.25rem; /* 4px */
  --space-2: 0.5rem;  /* 8px */
  --space-3: 0.75rem; /* 12px */
  --space-4: 1rem;    /* 16px */
  --space-6: 1.5rem;  /* 24px */
  --space-8: 2rem;    /* 32px */
  --space-12: 3rem;   /* 48px */
  --space-16: 4rem;   /* 64px */

  /* ---- Target sizes ---- */
  --target-min: 44px;      /* comfortable minimum */
  --target-floor: 24px;    /* absolute floor, needs ≥8px spacing */
  --target-gap: 8px;       /* minimum spacing between targets */
  --control-height: 44px;  /* buttons, inputs, selects */
  --control-choice: 24px;  /* checkbox / radio box */

  /* ---- Layout ---- */
  --layout-max: 75rem;     /* 1200px content max-width */
  --layout-reading: 42rem; /* ~672px comfortable reading measure */
  --layout-gutter: var(--space-6);
}

/* GlobalTech Accessible DS — Radius, border, elevation & focus tokens
   Restrained elevation — clarity over decoration. */

:root {
  /* ---- Corner radius (subtle, functional) ---- */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-pill: 999px;

  /* ---- Border widths ---- */
  --border-width: 1px;
  --border-width-strong: 2px;

  /* ---- Elevation — soft, low-contrast, never load-bearing for meaning ---- */
  --shadow-sm: 0 1px 2px rgba(31, 41, 51, 0.08);
  --shadow-md: 0 2px 6px rgba(31, 41, 51, 0.10);
  --shadow-lg: 0 8px 24px rgba(31, 41, 51, 0.14);

  /* ---- Focus indicator ----
     3px ring in focus colour + 2px offset + contrasting white halo,
     visible on light AND coloured backgrounds. Never removed. */
  --focus-ring-width: 3px;
  --focus-ring-offset: 2px;
  --focus-outline: var(--focus-ring-width) solid var(--color-focus-ring);
  /* Halo sits just outside the ring so it reads on dark/coloured surfaces */
  --focus-halo: 0 0 0 calc(var(--focus-ring-offset) + var(--focus-ring-width) + 2px) var(--color-focus-halo);
}

/* GlobalTech Accessible DS — Base element styles & accessibility primitives
   Applies the tokens to raw HTML so a plain landmark page is accessible
   by default. Consumers get: legible body text, underlined links, a
   universal focus-visible ring, screen-reader utilities, and reduced-motion. */

*, *::before, *::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-body-size);
  line-height: var(--text-body-line);
  color: var(--text-body);
  background: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4 { color: var(--text-body); margin: 0 0 var(--space-4); text-wrap: balance; }
h1 { font-size: var(--text-h1-size); line-height: var(--text-h1-line); font-weight: var(--text-h1-weight); }
h2 { font-size: var(--text-h2-size); line-height: var(--text-h2-line); font-weight: var(--text-h2-weight); }
h3 { font-size: var(--text-h3-size); line-height: var(--text-h3-line); font-weight: var(--text-h3-weight); }

p { margin: 0 0 var(--paragraph-spacing); max-width: var(--layout-reading); text-wrap: pretty; }

/* Links — always underlined, descriptive text expected */
a {
  color: var(--color-link);
  text-decoration: underline;
  text-underline-offset: 2px;
}
a:hover { color: var(--color-link-hover); text-decoration-thickness: 2px; }
a:visited { color: var(--color-link-visited); }

/* Universal keyboard focus — 3px ring, 2px offset, contrasting halo.
   Applied only for keyboard users via :focus-visible so it never
   flashes on mouse click, but is NEVER removed. */
:focus-visible {
  outline: var(--focus-outline);
  outline-offset: var(--focus-ring-offset);
  box-shadow: var(--focus-halo);
  border-radius: var(--radius-sm);
}
/* Fallback for engines without :focus-visible */
:focus:not(:focus-visible) { outline: none; }

/* Skip link — first in tab order, hidden until focused */
.gt-skip-link {
  position: absolute;
  left: var(--space-4);
  top: var(--space-4);
  transform: translateY(-200%);
  z-index: 1000;
  background: var(--color-primary);
  color: var(--color-primary-ink);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  text-decoration: underline;
  font-weight: var(--font-weight-semibold);
  transition: transform 120ms ease;
}
.gt-skip-link:focus { transform: translateY(0); color: var(--color-primary-ink); }

/* Screen-reader-only utility */
.gt-visually-hidden {
  position: absolute !important;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0);
  white-space: nowrap; border: 0;
}

/* Respect reduced-motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}
